name: Release

on:
  push:
    tags:
      - 'v*'

# contents: write — goreleaser creates the GitHub release and uploads assets.
# id-token + attestations: write — SLSA build provenance (#354): the attest
# step signs, via GitHub's OIDC identity (keyless Sigstore), a statement
# binding each artifact's digest to this repo, workflow, and commit. A
# downstream verifier (`gh attestation verify <file> -R jra3/linear-fuse`)
# can then detect a swapped artifact: checksums.txt alone is written by this
# same job, so it authenticates nothing by itself.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attest everything a downstream consumer verifies: the release archives
      # and checksums.txt (the AUR PKGBUILD pins its sha256sums from it).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
